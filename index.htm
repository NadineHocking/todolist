<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000" rel="stylesheet">

</head>
<body  class="primary-bg">
    <main class="container d-flex center">
        <div class="paper mt-2">
            <h1 class="mb-2">To-do list:</h1>
            <div class="row">
                <input class="input-field" id="task" placeholder="Add New Task">
                <button class="s-btn" onclick="addTask()"><span class="material-icons">add</span></button>
            </div>
            <div class="col mt-1 mb-1">
                <ul id="list"></ul>
            </div>
            <button class="btn mt-1" onclick="clearAll()">Clear All</button>
        </div>      
    </main>

    <footer class="d-flex m-t-5 secondary-bg">
        <section class="footer-strip">
			<p class="footer-text">&copy; 2026 To-Do List 2026</p>
		</section>
    </footer>
    <script src="assets/main.js"></script>
</body>
</html>
